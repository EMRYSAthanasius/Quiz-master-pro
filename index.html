<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz Mastermind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="home-screen" class="screen">
        <header class="home-header">
            <div class="header-titles">
                <h1>Quiz Engine</h1>
                <p>Master every subject</p>
            </div>
            <button class="refresh-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
        </header>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-number" id="stat-levels-done">0</div>
                <div class="stat-label">Levels Done</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-subjects">0</div>
                <div class="stat-label">Subjects</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-total-levels">0</div>
                <div class="stat-label">Total Levels</div>
            </div>
        </div>

        <div class="overall-progress-card">
            <div class="progress-header">
                <span class="progress-title">Overall Progress</span>
                <span class="progress-percent" id="overall-progress-text">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="overall-progress-bar"></div>
            </div>
        </div>

        <div class="subjects-header">
            <h2>Subjects</h2>
            <span class="subjects-count" id="subjects-count-text">0 subjects</span>
        </div>

        <div id="subject-grid" class="subject-container"></div>
    </section>

    <section id="level-screen" class="screen hidden">
        <button class="back-btn">← Subjects</button>
        <h2 id="selected-subject-name">Subject</h2>
        <div id="level-grid" class="level-grid"></div>
    </section>

    <section id="game-screen" class="screen hidden">
        <div class="game-header">
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="question-container">
            <h3 id="question-text">Question loading...</h3>
            <div id="options-grid" class="options-grid"></div>
        </div>
    </section>

    <div id="modal-overlay" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Level Clear!</h2>
            <p id="modal-score">Final Score: 0/20</p>
            <div class="modal-actions">
                <button id="retry-btn">Retry</button>
                <button id="next-level-btn">Next Level</button>
                <button id="home-btn">Home</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
