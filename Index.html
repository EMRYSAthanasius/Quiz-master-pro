<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>QuizMaster Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME SCREEN -->

  <div id="screen-home" class="screen active">
    <header class="home-header">
      <div class="logo-badge">QM</div>
      <div>
        <h1 class="app-title">QuizMaster</h1>
        <p class="app-subtitle">9,000 Questions · 15 Subjects</p>
      </div>
    </header>
    <p class="section-label">Choose a Subject</p>
    <div class="subject-container" id="subject-grid"></div>
  </div>

  <!-- LEVEL SELECT SCREEN -->

  <div id="screen-levels" class="screen">
    <header class="sub-header">
      <button class="back-btn" onclick="goHome()">← Home</button>
      <div>
        <h2 id="level-screen-title">Subject</h2>
        <p class="app-subtitle">Select a Level</p>
      </div>
    </header>
    <div class="level-container" id="level-grid"></div>
  </div>

  <!-- QUIZ SCREEN -->

  <div id="screen-quiz" class="screen">
    <header class="quiz-header">
      <button class="back-btn" onclick="exitToLevels()">← Levels</button>
      <div class="quiz-meta">
        <span id="quiz-subject-label"></span>
        <span id="quiz-level-label"></span>
      </div>
      <div class="score-badge" id="score-display">0</div>
    </header>

  <p class="question-number" id="question-number">Question 1</p>

  </div>

  <!-- LEVEL CLEAR MODAL -->

  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon" id="modal-icon">🏆</div>
      <h2 class="modal-title" id="modal-title">Level Clear!</h2>
      <p class="modal-score" id="modal-score"></p>
      <div class="modal-buttons">
        <button class="modal-btn secondary" onclick="retryLevel()">↩ Retry</button>
        <button class="modal-btn primary" id="next-level-btn" onclick="nextLevel()">Next Level →</button>
        <button class="modal-btn ghost" onclick="goHome()">🏠 Home</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>

  <script src="script.js"></script>

</body>
</html>
